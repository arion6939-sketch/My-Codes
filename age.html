<!DOCTYPE html>
<html >

<body>
    <p id="student1"></p>
    <p id="student2"></p>

    
</body>
<script>
    class Student {
        constructor(name, year){
            this.name = name;
            this.year = year;
        }
        age(){
            let date = new Date();
            return date.getFullYear() - this.year;



        }

    }
    const student1 = new Student("Riya",2014)
    const student2 = new Student("Tina", 2018)
    document.getElementById("student1").innerHTML = "My name is" + student1.name + "I was born in " + student1.age();
    document.getElementById("student2").innerHTML = "My name is" + student2.name + "I was born in " + student2.age();

</script>
</html>
