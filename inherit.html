<!DOCTYPE html>
<html>

<body>
    <p id="details"></p>
    
</body>
<script>
    class car{
        constructor(brand){
            this.carname=brand;
        }
        present(){
            return "I have a " + this.carname;
        }
        

    }
    class model extends car{
        constructor(brand,mod){
            super(brand);
            this.model=mod;
                
            
        }
        show(){
            return this.present()  + "it is a" + this.model
        }


    }
    let myCar = new model("Ferrari","Enzo")
    document.getElementById("details").innerHTML = myCar.show();
</script>
</html>
